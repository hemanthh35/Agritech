<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AgriTech AI{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% block extra_head %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="{{ url_for('index') }}">
        <img src="{{ url_for('static', filename='images/logo-leaf.svg') }}" alt="">
        <span>AgriTech Precision</span>
      </a>
      <nav class="nav">
        <a href="{{ url_for('index') }}" class="{{ 'active' if request.endpoint == 'index' else '' }}">Home</a>
        <a href="{{ url_for('crop_page') }}" class="{{ 'active' if request.endpoint == 'crop_page' else '' }}">Crop</a>
        <a href="{{ url_for('fertilizer_page') }}" class="{{ 'active' if request.endpoint == 'fertilizer_page' else '' }}">Fertilizer</a>
        <a href="{{ url_for('disease_page') }}" class="{{ 'active' if request.endpoint == 'disease_page' else '' }}">Disease</a>
        <a href="{{ url_for('metrics_page') }}" class="{{ 'active' if request.endpoint == 'metrics_page' else '' }}">Metrics</a>
      </nav>
    </div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    Local ML: RandomForest crop &amp; fertilizer · EfficientNetB0 disease (Keras)
  </footer>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
